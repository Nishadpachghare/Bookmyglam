<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sbsm-admin-panel</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        // Block Mixpanel beacon calls injected by browser privacy extensions.
        // This prevents console noise when the browser blocks the request.
        var blockedHosts = ['api-js.mixpanel.com', 'cdn.mxpnl.com'];

        // No-op mixpanel object to avoid uncaught errors
        window.mixpanel = window.mixpanel || { track: function(){}, init: function(){}, identify: function(){}, people: { set: function(){} } };

        function isBlockedUrl(url){
          if (!url || typeof url !== 'string') return false;
          return blockedHosts.some((host) => url.indexOf(host) !== -1);
        }

        // Intercept fetch requests to blocked host and resolve gracefully
        var origFetch = window.fetch;
        if(origFetch){
          window.fetch = function(input, init){
            try{
              var url = (typeof input === 'string') ? input : (input && input.url);
              if(isBlockedUrl(url)){
                return Promise.resolve(new Response(null, { status: 204 }));
              }
            }catch(e){ /* ignore */ }
            return origFetch.apply(this, arguments);
          };
        }

        // Intercept XHR send to blocked host
        try{
          var OrigXHR = window.XMLHttpRequest;
          function XHRProxy(){
            var xhr = new OrigXHR();
            var origOpen = xhr.open;
            xhr.open = function(method, url){ this._url = url; return origOpen.apply(this, arguments); };
            var origSend = xhr.send;
            xhr.send = function(){
              try{
                if(isBlockedUrl(this._url)){
                  this.readyState = 4;
                  this.status = 204;
                  if(typeof this.onreadystatechange === 'function') this.onreadystatechange();
                  if(typeof this.onload === 'function') this.onload();
                  return;
                }
              }catch(e){}
              return origSend.apply(this, arguments);
            };
            return xhr;
          }
          window.XMLHttpRequest = XHRProxy;
        }catch(e){ /* ignore */ }

        // Prevent Mixpanel image/beacon calls from generating console noise.
        try {
          if (navigator && navigator.sendBeacon) {
            var origBeacon = navigator.sendBeacon.bind(navigator);
            navigator.sendBeacon = function(url, data){
              if (isBlockedUrl(url)) return false;
              return origBeacon(url, data);
            };
          }
        } catch (e) { /* ignore */ }

        try {
          var OrigImage = window.Image;
          window.Image = function(){
            var img = new OrigImage();
            Object.defineProperty(img, 'src', {
              set: function(value){
                if (isBlockedUrl(value)) return;
                return OrigImage.prototype.__lookupSetter__('src').call(this, value);
              },
              get: function(){
                return OrigImage.prototype.__lookupGetter__('src').call(this);
              },
              configurable: true,
              enumerable: true
            });
            return img;
          };
        } catch (e) { /* ignore */ }

        // Also intercept image src on HTMLImageElement so <img src="..."> tags are blocked as well.
        try {
          var imgProto = HTMLImageElement && HTMLImageElement.prototype;
          if (imgProto) {
            var origDescriptor = Object.getOwnPropertyDescriptor(imgProto, 'src');
            if (origDescriptor && typeof origDescriptor.set === 'function') {
              Object.defineProperty(imgProto, 'src', {
                set: function(value) {
                  if (isBlockedUrl(value)) return;
                  return origDescriptor.set.call(this, value);
                },
                get: function() {
                  return origDescriptor.get.call(this);
                },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) { /* ignore */ }

        console.info('[Analytics] Intercepting Mixpanel calls to reduce blocked-by-client console noise.');

        // Suppress console errors caused by blocked Mixpanel/beacon requests.
        // Some browser extensions block these and emit `net::ERR_BLOCKED_BY_CLIENT`.
        // Suppress known extension/browser messaging errors
        window.addEventListener('error', (event) => {
          const msg = String(event.message || "");
          // Suppress "message channel closed" errors from browser extensions
          if (msg.includes('message channel closed') || msg.includes('asynchronous response')) {
            event.preventDefault();
            return;
          }
          if (msg.includes('net::ERR_BLOCKED_BY_CLIENT') || msg.includes('Failed to load resource')) {
            event.preventDefault();
          }
        });

        // Handle unhandled promise rejections from browser extensions
        window.addEventListener('unhandledrejection', (event) => {
          const msg = String(event.reason || "");
          if (msg.includes('message channel') || msg.includes('Extension') || 
              msg.includes('listener indicated') || msg.includes('asynchronous response')) {
            event.preventDefault();
          }
        });

        // Suppress extension-related console errors completely
        var origConsoleError = console.error;
        console.error = function() {
          var args = Array.from(arguments);
          var fullMsg = args.map(a => String(a || "")).join(' ');
          // Silently suppress extension messaging errors
          if (fullMsg.includes('listener indicated') || fullMsg.includes('message channel') ||
              fullMsg.includes('Extension') || fullMsg.includes('asynchronous response')) {
            return;
          }
          return origConsoleError.apply(console, arguments);
        };

        // Wrap chrome.runtime to prevent extension messaging errors
        if (typeof chrome !== 'undefined' && chrome.runtime) {
          try {
            var origOnMessage = chrome.runtime.onMessage;
            if (origOnMessage && origOnMessage.addListener) {
              var origAddListener = origOnMessage.addListener;
              chrome.runtime.onMessage.addListener = function(callback) {
                var wrappedCallback = function(request, sender, sendResponse) {
                  try {
                    var result = callback(request, sender, function(response) {
                      try {
                        sendResponse(response);
                      } catch(e) { }
                    });
                    // If callback returns true (async), ensure sendResponse is called
                    if (result === true) {
                      setTimeout(function() {
                        try {
                          sendResponse(null);
                        } catch(e) { }
                      }, 100);
                    }
                    return result;
                  } catch(e) {
                    try {
                      sendResponse(null);
                    } catch(e2) { }
                    return false;
                  }
                };
                return origAddListener.call(this, wrappedCallback);
              };
            }
          } catch(e) { /* ignore */ }
        }

      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
